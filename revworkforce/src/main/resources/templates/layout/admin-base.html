<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>RevWorkForce - Admin</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== ENHANCED ADMIN SIDEBAR (340px) ========== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap');

        :root {
            --accent: #0f766e;
            --accent-light: #14b8a6;
            --accent-dark: #115e59;
            --navy: #0b1a2e;
            --navy-light: #1e2f44;
            --bg-main: #f4f7fc;
            --text-light: #f0f3f8;
            --text-muted: #9aa9b9;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.15);
            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-main);
            color: #1e293b;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(15, 118, 110, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(15, 118, 110, 0.03) 0%, transparent 20%);
            pointer-events: none;
            z-index: -1;
        }

        /* ---------- SIDEBAR (now 340px) ---------- */
        .admin-sidebar {
            width: 340px;                      /* increased from 300px */
            background: var(--navy);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            box-shadow: 6px 0 30px rgba(0, 0, 0, 0.25);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 1000;
            transition: var(--transition);
            border-right: 1px solid rgba(15, 118, 110, 0.2);
        }

        .sidebar-header {
            padding: 2.5rem 1.5rem 1.5rem;
            font-family: var(--font-heading);
            font-size: 2rem;                    /* slightly larger */
            font-weight: 700;
            letter-spacing: 1.5px;
            color: white;
            border-bottom: 1px solid rgba(15, 118, 110, 0.3);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            text-align: center;
            position: relative;
        }

        .sidebar-header span {
            background: linear-gradient(135deg, var(--accent-light), #99f6e4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20%;
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .sidebar-nav {
            list-style: none;
            padding: 0 1rem 2rem;
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-nav li {
            margin-bottom: 0.4rem;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 1rem 1.8rem;              /* more horizontal padding */
            color: var(--text-muted);
            font-weight: 500;
            font-size: 1rem;                    /* slightly larger */
            text-decoration: none;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            border-left: 3px solid transparent;
            gap: 1rem;
        }

        .sidebar-nav a i {
            width: 24px;
            font-size: 1.2rem;
            color: var(--accent);
            transition: var(--transition);
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: rgba(15, 118, 110, 0.15);
            color: white;
            border-left-color: var(--accent);
            transform: translateX(5px);
        }

        .sidebar-nav a:hover i,
        .sidebar-nav a.active i {
            color: var(--accent-light);
            transform: scale(1.1);
        }

        .sidebar-nav a.active {
            background: rgba(15, 118, 110, 0.2);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
        }

        .sidebar-nav .logout-link {
            margin-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 1rem;
        }
        .sidebar-nav .logout-link a {
            color: #f9a8a8;
        }
        .sidebar-nav .logout-link a i {
            color: #f87171;
        }
        .sidebar-nav .logout-link a:hover {
            background: rgba(248, 113, 113, 0.12);
            border-left-color: #f87171;
            color: #fee2e2;
        }

        /* ---------- MAIN CONTENT (adjusted margin) ---------- */
        .admin-main {
            flex: 1;
            margin-left: 340px;                 /* matches new sidebar width */
            padding: 2rem;
            background: transparent;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 2.2rem;
            transition: var(--transition);
        }

        .content-card:hover {
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
        }

        /* ---------- TYPOGRAPHY ---------- */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--navy);
            letter-spacing: 0.4px;
        }

        h2 {
            font-size: 2.2rem;
            border-left: 6px solid var(--accent);
            padding-left: 1.5rem;
            margin-bottom: 2.2rem;
            position: relative;
        }

        h2::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 40px;
            height: 2px;
            background: var(--accent);
        }

        /* ---------- BUTTONS ---------- */
        .btn, button {
            border: none;
            border-radius: 30px;
            padding: 0.7rem 2rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: var(--transition);
            background: var(--navy);
            color: white;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            font-family: var(--font-body);
        }

        .btn-primary {
            background: linear-gradient(145deg, var(--accent), var(--accent-dark));
            color: white;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, var(--accent-light), var(--accent));
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 768px) {
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                flex-wrap: wrap;
            }
            .sidebar-header {
                width: 100%;
                padding: 1rem;
                font-size: 1.5rem;
            }
            .sidebar-nav {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                padding: 0.5rem;
            }
            .sidebar-nav li {
                margin: 0.2rem;
            }
            .sidebar-nav a {
                border-left: none;
                border-radius: 30px;
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
            .admin-main {
                margin-left: 0;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
<!-- SIDEBAR -->
<aside class="admin-sidebar">
    <div class="sidebar-header"><span>REVWORKFORCE</span></div>
    <ul class="sidebar-nav">
        <li><a href="/admin/dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="/admin/employees"><i class="fas fa-users"></i> Employees</a></li>
        <li><a href="/admin/leaves"><i class="fas fa-calendar-alt"></i> Leave Records</a></li>
        <li><a href="/admin/manager-leaves"><i class="fas fa-user-tie"></i> Manager Leaves</a></li>
        <li><a href="/admin/reports/leaves"><i class="fas fa-chart-line"></i> Leave Reports</a></li>
        <li><a href="/admin/announcements"><i class="fas fa-bullhorn"></i> Announcements</a></li>
        <li><a href="/admin/analytics"><i class="fas fa-chart-pie"></i> Analytics</a></li>
        <li><a href="/admin/policies"><i class="fas fa-file-contract"></i> Policies</a></li>
        <li><a href="/admin/register"><i class="fas fa-user-plus"></i> Register Employee</a></li>
        <li><a href="/admin/departments"><i class="fas fa-building"></i> Departments</a></li>
        <li><a href="/admin/designations"><i class="fas fa-id-badge"></i> Designations</a></li>
        <li><a href="/admin/calendar"><i class="fas fa-calendar"></i> Calendar</a></li>
        <li><a href="/admin/activity-logs"><i class="fas fa-history"></i> Activity Logs</a></li>
        <li><a href="/admin/profile"><i class="fas fa-users"></i> My Profile</a></li>
        <li class="logout-link"><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
</aside>

<!-- MAIN CONTENT -->
<main class="admin-main">
    <div class="content-card">
        <!-- ===== FLASH MESSAGES ===== -->
        <div th:if="${errorMessage}" style="margin-bottom:1.2rem; padding:1rem 1.5rem; background:#fee2e2; color:#b91c1c; border-radius:14px; border:1px solid #fecaca; font-size:0.95rem; font-weight:500; display:flex; align-items:center; gap:0.7rem;">
            &#x26A0;&#xFE0F; <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${successMessage}" style="margin-bottom:1.2rem; padding:1rem 1.5rem; background:#d1fae5; color:#065f46; border-radius:14px; border:1px solid #a7f3d0; font-size:0.95rem; font-weight:500; display:flex; align-items:center; gap:0.7rem;">
            &#x2705; <span th:text="${successMessage}"></span>
        </div>

        <!-- ===== FLASH MESSAGES ===== -->
        <div th:if="${errorMessage}" style="margin-bottom:1.2rem; padding:1rem 1.5rem; background:#fee2e2; color:#b91c1c; border-radius:14px; border:1px solid #fecaca; font-size:0.95rem; font-weight:500; display:flex; align-items:center; gap:0.7rem;">
            &#x26A0;&#xFE0F; <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${successMessage}" style="margin-bottom:1.2rem; padding:1rem 1.5rem; background:#d1fae5; color:#065f46; border-radius:14px; border:1px solid #a7f3d0; font-size:0.95rem; font-weight:500; display:flex; align-items:center; gap:0.7rem;">
            &#x2705; <span th:text="${successMessage}"></span>
        </div>

        <div th:replace="${content}"></div>
    </div>
</main>
</body>
</html>
