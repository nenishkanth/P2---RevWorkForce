<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>RevWorkForce - Manager</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== PREMIUM MANAGER LAYOUT ========== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        :root {
            --accent: #0f766e;
            --accent-light: #2dd4bf;
            --accent-dark: #0b5e57;
            --navy: #0b1a2e;
            --navy-light: #1e2f44;
            --bg-main: #f0f5fa;
            --text-light: #f0f3f8;
            --text-muted: #9aa9b9;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 32px 64px rgba(0, 0, 0, 0.15);
            --font-heading: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius: 24px;
            --radius-sm: 14px;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-main);
            color: #1e293b;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(15, 118, 110, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 85% 70%, rgba(45, 212, 191, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(15, 118, 110, 0.05) 0%, transparent 45%);
            pointer-events: none;
            z-index: -1;
            animation: slowDrift 40s infinite alternate;
        }

        @keyframes slowDrift {
            0% { transform: scale(1) rotate(0deg); opacity: 0.7; }
            100% { transform: scale(1.2) rotate(3deg); opacity: 0.9; }
        }

        /* ========== PREMIUM TOP NAVBAR ========== */
        .manager-nav {
            background: rgba(11, 26, 46, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(45, 212, 191, 0.2);
            padding: 0.8rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }

        .nav-brand {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            text-decoration: none;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            transition: var(--transition);
            background: transparent;
            border: 1px solid transparent;
        }

        .nav-link i {
            font-size: 1.1rem;
            color: var(--accent);
            transition: var(--transition);
        }

        .nav-link:hover {
            background: rgba(45, 212, 191, 0.1);
            color: white;
            border-color: rgba(45, 212, 191, 0.3);
            transform: translateY(-2px);
        }

        .nav-link:hover i {
            color: var(--accent-light);
            transform: scale(1.1);
        }

        /* Active link styling */
        .nav-link.active {
            background: rgba(45, 212, 191, 0.15);
            color: white;
            border-color: var(--accent-light);
            box-shadow: 0 8px 20px -10px rgba(45, 212, 191, 0.4);
        }

        .nav-link.active i {
            color: var(--accent-light);
        }

        /* Profile dropdown */
        .profile-menu {
            position: relative;
            margin-left: 1rem;
        }

        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(45, 212, 191, 0.3);
            padding: 0.4rem 1rem 0.4rem 0.6rem;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
        }

        .profile-trigger:hover {
            background: rgba(45, 212, 191, 0.15);
            border-color: var(--accent-light);
        }

        .profile-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(145deg, var(--accent), var(--accent-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .profile-name {
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .profile-dropdown {
            position: absolute;
            top: 120%;
            right: 0;
            background: rgba(11, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(45, 212, 191, 0.3);
            border-radius: var(--radius-sm);
            padding: 0.8rem;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
            box-shadow: var(--shadow-lg);
        }

        .profile-menu:hover .profile-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .profile-dropdown a {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .profile-dropdown a:hover {
            background: rgba(45, 212, 191, 0.1);
            color: white;
        }

        .profile-dropdown a i {
            width: 20px;
            color: var(--accent);
        }

        .profile-dropdown .logout-link {
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 0.5rem;
            padding-top: 0.8rem;
        }
        .profile-dropdown .logout-link i {
            color: #f87171;
        }

        /* ========== MAIN CONTENT CARD ========== */
        .manager-main {
            flex: 1;
            padding: 2.5rem;
            background: transparent;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: var(--radius);
            box-shadow: var(--shadow-xl);
            border: 1px solid transparent;
            background-clip: padding-box;
            position: relative;
            padding: 2.5rem;
            transition: var(--transition);
        }

        .content-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(145deg, var(--accent-light), transparent 40%, var(--accent));
            border-radius: calc(var(--radius) + 2px);
            z-index: -1;
            opacity: 0.4;
            transition: opacity 0.4s;
        }

        .content-card:hover {
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.8);
        }

        .content-card:hover::before {
            opacity: 0.7;
        }

        /* ========== TYPOGRAPHY ========== */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--navy);
            letter-spacing: 0.3px;
        }

        h2 {
            font-size: 2.2rem;
            border-left: 6px solid var(--accent);
            padding-left: 1.5rem;
            margin-bottom: 2.2rem;
            position: relative;
            background: linear-gradient(145deg, var(--navy), var(--navy-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -10px;
            width: 50px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 4px;
            animation: expandWidth 2s infinite alternate;
        }

        @keyframes expandWidth {
            0% { width: 40px; opacity: 0.6; }
            100% { width: 80px; opacity: 1; }
        }

        /* ========== BUTTONS ========== */
        .btn, button {
            border: none;
            border-radius: 40px;
            padding: 0.8rem 2.4rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            transition: var(--transition);
            background: var(--navy);
            color: white;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(145deg, var(--accent), var(--accent-dark));
            color: white;
            font-weight: 600;
            box-shadow: 0 10px 20px -8px rgba(15, 118, 110, 0.5);
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, var(--accent-light), var(--accent));
            transform: translateY(-3px);
            box-shadow: 0 18px 30px -10px rgba(45, 212, 191, 0.6);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1200px) {
            .nav-links {
                gap: 0.8rem;
            }
            .nav-link {
                padding: 0.5rem 0.8rem;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 992px) {
            .manager-nav {
                flex-wrap: wrap;
                padding: 0.8rem 1.5rem;
            }
            .nav-links {
                order: 3;
                width: 100%;
                justify-content: center;
                margin-top: 0.8rem;
                padding-top: 0.8rem;
                border-top: 1px solid rgba(255,255,255,0.1);
            }
        }

        @media (max-width: 768px) {
            .manager-nav {
                flex-direction: column;
                align-items: stretch;
                padding: 0.8rem 1rem;
            }
            .nav-brand {
                text-align: center;
                margin-bottom: 0.5rem;
            }
            .profile-menu {
                margin-left: 0;
                align-self: center;
            }
            .nav-links {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }
            .nav-link {
                justify-content: center;
            }
            .manager-main {
                padding: 1.5rem;
            }
            .content-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<!-- Premium Manager Navbar -->
<nav class="manager-nav">
    <a href="/manager/dashboard" class="nav-brand">RevWorkForce</a>

    <div class="nav-links">
        <a href="/manager/dashboard" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/manager/team" class="nav-link"><i class="fas fa-users"></i> Team</a>
        <a href="/manager/leaves" class="nav-link"><i class="fas fa-calendar-alt"></i> Leave Requests</a>
        <a href="/manager/goals" class="nav-link"><i class="fas fa-bullseye"></i> Goals</a>
        <a href="/manager/my-goals" class="nav-link"><i class="fas fa-clipboard-list"></i> My Goals</a>
        <a href="/manager/reviews" class="nav-link"><i class="fas fa-star"></i> Reviews</a>
        <a href="/manager/team-leave-calendar" class="nav-link"><i class="fas fa-calendar-week"></i> Team Calendar</a>
        <a href="/manager/apply-leave" class="nav-link"><i class="fas fa-paper-plane"></i> Apply Leave</a>
        <a href="/manager/announcements" class="nav-link"><i class="fas fa-bullhorn"></i> Announcements</a>
        <a href="/manager/notifications" class="nav-link"><i class="fas fa-bell"></i> Notifications</a>
    </div>

    <!-- Profile Dropdown -->
    <div class="profile-menu">
        <div class="profile-trigger">
            <div class="profile-avatar"
                 th:text="${loggedInEmployee != null ? #strings.substring(loggedInEmployee.firstName, 0, 1) : ( #authentication != null ? #strings.substring(#authentication.name, 0, 1) : 'M' )}">
                M
            </div>
            <span class="profile-name"
                  th:text="${loggedInEmployee != null ? loggedInEmployee.firstName + ' ' + loggedInEmployee.lastName : ( #authentication != null ? #authentication.name : 'Manager' )}">
                Manager
            </span>
            <i class="fas fa-chevron-down" style="color: var(--text-muted); font-size: 0.8rem;"></i>
        </div>
        <div class="profile-dropdown">
            <a href="/manager/profile"><i class="fas fa-user"></i> My Profile</a>
            <a href="/manager/calendar"><i class="fas fa-calendar"></i> Calendar</a>
            <a href="/logout" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
</nav>

<!-- Main Content Area -->
<main class="manager-main">
    <div class="content-card">
        <!-- ===== FLASH MESSAGES ===== -->
        <div th:if="${errorMessage}" style="margin-bottom:1.2rem; padding:1rem 1.5rem; background:#fee2e2; color:#b91c1c; border-radius:14px; border:1px solid #fecaca; font-size:0.95rem; font-weight:500; display:flex; align-items:center; gap:0.7rem;">
            &#x26A0;&#xFE0F; <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${successMessage}" style="margin-bottom:1.2rem; padding:1rem 1.5rem; background:#d1fae5; color:#065f46; border-radius:14px; border:1px solid #a7f3d0; font-size:0.95rem; font-weight:500; display:flex; align-items:center; gap:0.7rem;">
            &#x2705; <span th:text="${successMessage}"></span>
        </div>

        <!-- ===== FLASH MESSAGES ===== -->
        <div th:if="${errorMessage}" style="margin-bottom:1.2rem; padding:1rem 1.5rem; background:#fee2e2; color:#b91c1c; border-radius:14px; border:1px solid #fecaca; font-size:0.95rem; font-weight:500; display:flex; align-items:center; gap:0.7rem;">
            &#x26A0;&#xFE0F; <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${successMessage}" style="margin-bottom:1.2rem; padding:1rem 1.5rem; background:#d1fae5; color:#065f46; border-radius:14px; border:1px solid #a7f3d0; font-size:0.95rem; font-weight:500; display:flex; align-items:center; gap:0.7rem;">
            &#x2705; <span th:text="${successMessage}"></span>
        </div>

        <div th:replace="${content}"></div>
    </div>
</main>

</body>
</html>
