<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/employee-base :: layout(~{::content})">

<div th:fragment="content">
    <style>
        /* ===== PREMIUM DASHBOARD STYLING ===== */
        :root {
            --accent: #0f766e;
            --accent-light: #2dd4bf;
            --accent-dark: #0b5e57;
            --navy: #0b1a2e;
            --navy-light: #1e2f44;
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.12);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Profile section */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .avatar-wrapper {
            position: relative;
        }

        .avatar-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent);
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        .avatar-img:hover {
            transform: scale(1.02);
            border-color: var(--accent-light);
        }

        .no-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 2.5rem;
            box-shadow: var(--shadow-sm);
        }

        .profile-details h2 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--navy);
        }

        .profile-details h2 span {
            background: linear-gradient(145deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-details p {
            margin: 0.3rem 0;
            color: #475569;
            font-size: 1rem;
        }

        .profile-details b {
            color: var(--navy);
        }

        /* Stats cards */
        .stats-container {
            display: flex;
            gap: 1.5rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 160px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.5rem 1rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(45, 212, 191, 0.2);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(45, 212, 191, 0.4);
            background: rgba(255, 255, 255, 0.7);
        }

        .stat-card h4 {
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 0.5rem;
        }

        .stat-card h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
            margin: 0;
            line-height: 1.2;
        }

        /* Section styling */
        .dashboard-section {
            margin: 2.5rem 0;
        }

        .dashboard-section h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 1.2rem;
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .list-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(45, 212, 191, 0.15);
        }

        .holiday-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .holiday-list li {
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(45, 212, 191, 0.2);
            font-size: 1rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .holiday-list li:last-child {
            border-bottom: none;
        }

        .holiday-list li::before {
            content: "🎉";
            font-size: 1.2rem;
        }

        .notification-item {
            padding: 1rem 1.2rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.8rem;
            border: 1px solid rgba(45, 212, 191, 0.15);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .notification-item:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--accent-light);
            transform: translateX(5px);
        }

        .notification-item::before {
            content: "🔔";
            font-size: 1.2rem;
        }

        .empty-message {
            padding: 1rem;
            color: #64748b;
            font-style: italic;
            text-align: center;
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
            margin: 2rem 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-section {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
            .profile-details h2 {
                font-size: 1.8rem;
            }
            .stat-card {
                min-width: 100%;
            }
        }
    </style>

    <div class="dashboard-container">
        <!-- Profile Section (no default image) -->
        <div class="profile-section">
            <div class="avatar-wrapper">
                <!-- Show image only if exists -->
                <img th:if="${employee.profilePic != null}"
                     th:src="@{'/uploads/' + ${employee.profilePic}}"
                     class="avatar-img"
                     alt="Profile">
                <!-- Show icon placeholder if no image -->
                <div th:if="${employee.profilePic == null}" class="no-avatar">
                    <i class="fas fa-user"></i>
                </div>
            </div>
            <div class="profile-details">
                <h2>
                    👋 Hello,
                    <span th:text="${employee.firstName}"></span>
                </h2>
                <p>Welcome back to <b>RevWorkForce</b></p>
                <p><b>Employee ID:</b> <span th:text="${employee.employeeId}"></span></p>
                <p><b>Department:</b>
                    <span th:text="${employee.department != null ? employee.department.name : 'Not Assigned'}"></span>
                </p>
                <p><b>Designation:</b>
                    <span th:text="${employee.designation != null ? employee.designation.name : 'Not Assigned'}"></span>
                </p>
            </div>
        </div>

        <hr>

        <!-- Quick Stats (Leave Balances) -->
        <h3 style="font-size:1.5rem; font-weight:700; color:var(--navy); margin-bottom:1rem;">📊 Leave Balance</h3>
        <div class="stats-container">
            <div class="stat-card">
                <h4>Casual Leave</h4>
                <h2 th:text="${leaveBalance.casualLeave}">0</h2>
            </div>
            <div class="stat-card">
                <h4>Sick Leave</h4>
                <h2 th:text="${leaveBalance.sickLeave}">0</h2>
            </div>
            <div class="stat-card">
                <h4>Paid Leave</h4>
                <h2 th:text="${leaveBalance.paidLeave}">0</h2>
            </div>
            <div class="stat-card">
                <h4>Pending Leaves</h4>
                <h2 th:text="${pendingLeaves}">0</h2>
            </div>
            <div class="stat-card">
                <h4>Upcoming Holidays</h4>
                <h2 th:text="${holidaysCount}">0</h2>
            </div>
        </div>

        <!-- Upcoming Holidays -->
        <div class="dashboard-section">
            <h3><i class="fas fa-calendar-day" style="color:var(--accent);"></i> Upcoming Holidays</h3>
            <div class="list-card">
                <ul class="holiday-list">
                    <li th:each="holiday : ${holidays}"
                        th:text="${holiday.name + ' - ' + holiday.date}">
                    </li>
                    <li th:if="${#lists.isEmpty(holidays)}" class="empty-message">
                        No upcoming holidays
                    </li>
                </ul>
            </div>
        </div>

        <!-- Notifications -->
        <div class="dashboard-section">
            <h3><i class="fas fa-bell" style="color:var(--accent);"></i> Notifications</h3>
            <div class="list-card" style="padding:0.5rem;">
                <div th:each="note : ${notifications}" class="notification-item"
                     th:text="${note.message}">
                </div>
                <div th:if="${#lists.isEmpty(notifications)}" class="empty-message">
                    No new notifications
                </div>
            </div>
        </div>
    </div>
</div>
</html>
