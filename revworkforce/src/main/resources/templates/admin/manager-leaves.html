<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::content})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div th:fragment="content">
    <style>
        .content-wrapper {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 35px -8px rgba(0,34,64,0.15), 0 8px 18px -6px rgba(0,0,0,0.05);
            padding: 1.75rem 2rem 2rem;
            margin: 2rem auto;
            max-width: 100%;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 1.75rem;
            letter-spacing: -0.01em;
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #edf2f7;
            background: white;
            margin-top: 1.5rem;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 800px;
        }

        .table th {
            text-align: left;
            padding: 1rem;
            background: #f8fafd;
            color: #475569;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid #e2e8f0;
        }

        .table td {
            padding: 1rem;
            border-bottom: 1px solid #eef2f6;
            color: #1e293b;
            vertical-align: middle;
        }

        .table tbody tr:hover td {
            background-color: #fafcff;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .badge-approved  { background: #e3f7ec; color: #0b6b4f; }
        .badge-pending   { background: #fef3c7; color: #b45309; }
        .badge-rejected  { background: #fee9e7; color: #b34033; }
        .badge-cancelled { background: #e9eef4; color: #475569; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            text-decoration: none;
        }

        .btn-approve {
            background: #e3f7ec;
            color: #0b6b4f;
            border: 1px solid #a7f3d0;
        }

        .btn-approve:hover {
            background: #0b6b4f;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px -4px rgba(11,107,79,0.4);
        }

        .btn-reject {
            background: #fee9e7;
            color: #b34033;
            border: 1px solid #fecaca;
        }

        .btn-reject:hover {
            background: #b34033;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px -4px rgba(179,64,51,0.4);
        }

        .action-form {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-form input[type="text"] {
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            color: #1e293b;
            outline: none;
            width: 160px;
            transition: all 0.15s;
        }

        .action-form input[type="text"]:focus {
            border-color: #3b7cff;
            box-shadow: 0 0 0 3px rgba(59,124,255,0.15);
        }

        .actions-cell {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .empty-row td {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
            font-style: italic;
        }

        .section-tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            background: white;
            color: #475569;
            transition: all 0.15s;
            text-decoration: none;
        }

        .tab-btn.active, .tab-btn:hover {
            background: #0f766e;
            color: white;
            border-color: #0f766e;
        }
    </style>

    <div class="content-wrapper">
        <h2>Manager Leave Requests</h2>

        <!-- Tabs: Pending / All -->
        <div class="section-tabs">
            <a th:href="@{/admin/manager-leaves}" class="tab-btn active">Pending Requests</a>
            <a th:href="@{/admin/manager-leaves/all}" class="tab-btn">All Requests</a>
        </div>

        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>Manager</th>
                    <th>Leave Type</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="leave : ${managerLeaves}">
                    <td th:text="${leave.employee.firstName + ' ' + leave.employee.lastName}"></td>
                    <td th:text="${leave.leaveType}"></td>
                    <td th:text="${leave.startDate}"></td>
                    <td th:text="${leave.endDate}"></td>
                    <td th:text="${leave.reason != null ? leave.reason : '-'}"></td>
                    <td>
                            <span class="badge"
                                  th:classappend="${leave.status.name() == 'APPROVED'  ? 'badge-approved'  :
                                                  (leave.status.name() == 'PENDING'   ? 'badge-pending'   :
                                                  (leave.status.name() == 'REJECTED'  ? 'badge-rejected'  : 'badge-cancelled'))}"
                                  th:text="${leave.status}">
                            </span>
                    </td>
                    <td>
                        <div class="actions-cell" th:if="${leave.status.name() == 'PENDING'}">
                            <!-- Approve -->
                            <form th:action="@{'/admin/manager-leaves/approve/' + ${leave.id}}" method="post" class="action-form">
                                <input type="text" name="comment" placeholder="Comment (optional)">
                                <button type="submit" class="btn btn-approve">✓ Approve</button>
                            </form>
                            <!-- Reject -->
                            <form th:action="@{'/admin/manager-leaves/reject/' + ${leave.id}}" method="post" class="action-form">
                                <input type="text" name="comment" placeholder="Reason (required)">
                                <button type="submit" class="btn btn-reject">✕ Reject</button>
                            </form>
                        </div>
                        <span th:if="${leave.status.name() != 'PENDING'}"
                              th:text="${leave.managerComments != null ? leave.managerComments : '-'}"
                              style="color:#64748b; font-size:0.85rem;">-</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(managerLeaves)}" class="empty-row">
                    <td colspan="7">No manager leave requests found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
