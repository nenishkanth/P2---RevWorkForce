<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::content})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div th:fragment="content">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f5f9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1e293b;
        }

        .content-wrapper {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 35px -8px rgba(0, 34, 64, 0.15), 0 8px 18px -6px rgba(0, 0, 0, 0.05);
            padding: 1.75rem 2rem 2rem;
            margin: 2rem auto;
            max-width: 100%;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
        }

        /* form styling */
        .department-form {
            background: #f8fafd;
            border-radius: 20px;
            padding: 1.5rem 2rem;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            flex: 1 1 200px;
            min-width: 180px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.8rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: white;
            transition: all 0.15s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #3b7cff;
            box-shadow: 0 0 0 4px rgba(59, 124, 255, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            border: 1px solid transparent;
            text-decoration: none;
        }

        .btn-primary {
            background: #3b7cff;
            border-color: #3b7cff;
            color: white;
            box-shadow: 0 4px 10px -2px rgba(59, 124, 255, 0.4);
        }

        .btn-primary:hover {
            background: #2563eb;
            border-color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 8px 16px -4px rgba(59, 124, 255, 0.5);
        }

        .btn-danger {
            background: #fee2e2;
            border-color: #fecaca;
            color: #b91c1c;
        }

        .btn-danger:hover {
            background: #fecaca;
            border-color: #fca5a5;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
        }

        /* table styles */
        .table-responsive {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #edf2f7;
            background: white;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 600px;
        }

        .table th {
            text-align: left;
            padding: 1rem 1.2rem;
            background: #f8fafd;
            color: #475569;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid #e2e8f0;
        }

        .table td {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #eef2f6;
            color: #1e293b;
            vertical-align: middle;
        }

        .table tbody tr:hover td {
            background-color: #fafcff;
        }

        .action-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .action-group form {
            margin: 0;
        }
    </style>

    <div class="content-wrapper">
        <h2>Manage Departments</h2>

        <!-- Add / Edit Form -->
        <form th:action="@{/admin/departments/save}" method="post" class="department-form">
            <input type="hidden" name="id" th:value="${department.id}">

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" th:value="${department.name}" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" th:text="${department.description}"></textarea>
            </div>

            <div class="form-group" style="flex: 0 0 auto;">
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>

        <!-- Departments List -->
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="d : ${departments}">
                        <td th:text="${d.id}"></td>
                        <td th:text="${d.name}"></td>
                        <td th:text="${d.description}"></td>
                        <td>
                            <div class="action-group">
                                <a th:href="@{'/admin/departments/edit/' + ${d.id}}"
                                   class="btn btn-primary btn-sm">Edit</a>
                                <form th:action="@{'/admin/departments/delete/' + ${d.id}}"
                                      method="post"
                                      style="display:inline;">
                                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
