<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::content})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div th:fragment="content">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f5f9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1e293b;
        }

        .content-wrapper {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 35px -8px rgba(0, 34, 64, 0.15), 0 8px 18px -6px rgba(0, 0, 0, 0.05);
            padding: 1.75rem 2rem 2rem;
            margin: 2rem auto;
            max-width: 100%;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 1.75rem;
            letter-spacing: -0.01em;
        }

        /* table container */
        .table-responsive {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #edf2f7;
            background: white;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 800px;
        }

        .table th {
            text-align: left;
            padding: 1rem 1.2rem;
            background: #f8fafd;
            color: #475569;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid #e2e8f0;
        }

        .table td {
            padding: 0.75rem 1.2rem;
            border-bottom: 1px solid #eef2f6;
            color: #1e293b;
            vertical-align: middle;
        }

        .table tbody tr:hover td {
            background-color: #fafcff;
        }

        /* role cell */
        td:first-child {
            font-weight: 600;
            color: #0f172a;
        }

        /* form controls inside table */
        .form-control {
            width: 100%;
            padding: 0.5rem 0.8rem;
            font-size: 0.9rem;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #ffffff;
            transition: border 0.15s, box-shadow 0.15s;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b7cff;
            box-shadow: 0 0 0 4px rgba(59, 124, 255, 0.15);
        }

        /* number input specific styling */
        input[type="number"].form-control {
            -moz-appearance: textfield;
            width: 100px;
        }
        input[type="number"].form-control::-webkit-outer-spin-button,
        input[type="number"].form-control::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            border: 1px solid transparent;
            text-decoration: none;
        }

        .btn-primary {
            background: #3b7cff;
            border-color: #3b7cff;
            color: white;
            box-shadow: 0 4px 10px -2px rgba(59, 124, 255, 0.4);
        }

        .btn-primary:hover {
            background: #2563eb;
            border-color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 8px 16px -4px rgba(59, 124, 255, 0.5);
        }

        /* single form per row */
        .row-form {
            display: contents;
        }

        /* small screen adjustment */
        @media (max-width: 600px) {
            input[type="number"].form-control {
                width: 100%;
            }
        }
    </style>

    <div class="content-wrapper">
        <h2>Leave Policy Management</h2>

        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Role</th>
                        <th>Casual Leave</th>
                        <th>Sick Leave</th>
                        <th>Paid Leave</th>
                        <th>Update</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${policies}">
                        <form th:action="@{/admin/policies/update}" method="post" class="row-form">
                            <input type="hidden" name="id" th:value="${p.id}">
                            <input type="hidden" name="role" th:value="${p.role}">
                            
                            <td th:text="${p.role}"></td>
                            <td>
                                <input type="number" name="casualLeave" 
                                       th:value="${p.casualLeave}" class="form-control" step="1" min="0">
                            </td>
                            <td>
                                <input type="number" name="sickLeave" 
                                       th:value="${p.sickLeave}" class="form-control" step="1" min="0">
                            </td>
                            <td>
                                <input type="number" name="paidLeave" 
                                       th:value="${p.paidLeave}" class="form-control" step="1" min="0">
                            </td>
                            <td>
                                <button type="submit" class="btn btn-primary">Update</button>
                            </td>
                        </form>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
