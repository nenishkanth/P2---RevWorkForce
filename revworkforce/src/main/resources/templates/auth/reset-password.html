<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 40%, #0f766e 80%);
            position: relative;
            animation: gradientShift 12s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* Animated overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 40%, rgba(45, 212, 191, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 35%);
            pointer-events: none;
            z-index: 0;
        }

        /* Main card */
        .reset-card {
            max-width: 440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 40px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 2.8rem 2.5rem;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .reset-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Header */
        .reset-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .reset-header h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(145deg, #0f172a, #0f766e, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .reset-header p {
            color: #334155;
            font-size: 1rem;
            font-weight: 500;
            background: rgba(255,255,255,0.3);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        /* Form */
        .reset-form {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group label i {
            color: #0f766e;
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background: white;
            transition: all 0.3s;
            box-shadow: 0 4px 10px -5px rgba(0,0,0,0.1);
        }

        .input-group input:focus {
            border-color: #8b5cf6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2), 0 4px 10px -5px rgba(0,0,0,0.1);
        }

        /* Button */
        .reset-btn {
            background: linear-gradient(145deg, #0f766e, #8b5cf6);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 15px 25px -10px rgba(15, 118, 110, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .reset-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 35px -12px rgba(139, 92, 246, 0.6);
            background: linear-gradient(145deg, #2dd4bf, #a78bfa);
        }

        .reset-btn i {
            font-size: 1.1rem;
        }

        /* Back to login link */
        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: #0f172a;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(255,255,255,0.3);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .back-link a:hover {
            background: white;
            color: #0f766e;
            gap: 0.5rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .reset-card {
                padding: 2rem 1.5rem;
            }
            .reset-header h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="reset-header">
            <h2>Reset Password</h2>
            <p>Enter your new password</p>
        </div>

        <form action="/auth/reset-password" method="post" class="reset-form">
            <input type="hidden" name="email" th:value="${email}">

            <div class="input-group">
                <label><i class="fas fa-lock"></i> New Password</label>
                <input type="password" name="password" placeholder="Enter new password" required>
            </div>

            <button type="submit" class="reset-btn">
                <i class="fas fa-redo-alt"></i> Reset Password
            </button>
        </form>

        <div class="back-link">
            <a href="/auth/login"><i class="fas fa-chevron-left"></i> Back to login</a>
        </div>
    </div>
</body>
</html>
