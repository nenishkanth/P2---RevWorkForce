<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/manager-base :: layout(~{::content})}">

<div th:fragment="content">

<style>
:root {
    --accent:#0f766e;
    --accent-light:#2dd4bf;
    --accent-dark:#0b5e57;
    --navy:#0b1a2e;
    --text-muted:#64748b;
    --border-color:#e2e8f0;
    --radius:24px;
    --shadow-md:0 8px 20px -6px rgba(0,0,0,0.1);
}

.profile-container{
    max-width:900px;
    margin:auto;
}

.profile-card{
    background:white;
    border-radius:var(--radius);
    box-shadow:var(--shadow-md);
    padding:2rem;
    margin-bottom:2rem;
}

h2{
    font-size:1.8rem;
    font-weight:600;
    border-left:6px solid var(--accent);
    padding-left:1rem;
    margin-bottom:2rem;
}

h3{
    margin:2rem 0 1rem;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:1.5rem;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-size:0.8rem;
    color:var(--text-muted);
}

.form-group input,
.form-group select{
    padding:0.6rem 0.9rem;
    border-radius:12px;
    border:1px solid var(--border-color);
}

.form-group input[readonly]{
    background:#f8fafc;
}

.save-btn{
    background:linear-gradient(145deg,var(--accent),var(--accent-dark));
    color:white;
    border:none;
    padding:0.8rem 1.5rem;
    border-radius:40px;
    cursor:pointer;
    margin-top:1rem;
}

.profile-image{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

.profile-image-placeholder{
    width:120px;
    height:120px;
    border-radius:50%;
    background:var(--accent);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
}

.file-upload{
    margin-top:10px;
}

</style>


<div class="profile-container">

<h2>My Profile</h2>

<!-- PROFILE UPDATE FORM -->

<form method="post"
      action="/manager/profile/update"
      enctype="multipart/form-data"
      class="profile-card">

<div style="text-align:center;margin-bottom:20px">

<div th:if="${employee.profilePic != null}">
<img th:src="@{'/uploads/' + ${employee.profilePic}}" class="profile-image">
</div>

<div th:if="${employee.profilePic == null}" class="profile-image-placeholder">
<span th:text="${#strings.substring(employee.firstName,0,1)}"></span>
</div>

<div class="file-upload">
<label>Change Photo</label>
<input type="file" name="profilePic">
</div>

</div>


<div class="form-grid">

<div class="form-group">
<label>Employee ID</label>
<input type="text" th:value="${employee.employeeId}" readonly>
</div>

<div class="form-group">
<label>First Name</label>
<input type="text" th:value="${employee.firstName}" readonly>
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" th:value="${employee.lastName}" readonly>
</div>

<div class="form-group">
<label>Email</label>
<input type="text" th:value="${employee.email}" readonly>
</div>

<div class="form-group">
<label>Department</label>
<input type="text"
th:value="${employee.department != null ? employee.department.name : 'Not Assigned'}"
readonly>
</div>

<div class="form-group">
<label>Designation</label>
<input type="text"
th:value="${employee.designation != null ? employee.designation.name : 'Not Assigned'}"
readonly>
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" name="phoneNumber" th:value="${employee.phoneNumber}">
</div>

<div class="form-group">
<label>Address</label>
<input type="text" name="address" th:value="${employee.address}">
</div>

<div class="form-group">
<label>Emergency Contact</label>
<input type="text" name="emergencyContact" th:value="${employee.emergencyContact}">
</div>

<div class="form-group">
<label>Date Of Birth</label>
<input type="date" name="dob" th:value="${employee.dob}">
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option value="MALE" th:selected="${employee.gender=='MALE'}">Male</option>
<option value="FEMALE" th:selected="${employee.gender=='FEMALE'}">Female</option>
<option value="OTHER" th:selected="${employee.gender=='OTHER'}">Other</option>
</select>
</div>

</div>

<button type="submit" class="save-btn">
Save Profile
</button>

</form>


<!-- SECURITY QUESTIONS FORM -->

<form method="post"
      action="/manager/security/update"
      class="profile-card">

<h3>Security Questions</h3>

<div class="form-grid">

<div class="form-group">
<label>Security Question 1</label>
<select name="securityQuestion1">
<option value="What is your first school name?">First School Name</option>
<option value="What is your favourite food?">Favourite Food</option>
<option value="What is your childhood nickname?">Childhood Nickname</option>
</select>

<input type="text" name="securityAnswer1" placeholder="Answer">
</div>


<div class="form-group">
<label>Security Question 2</label>
<select name="securityQuestion2">
<option value="What is your favourite teacher name?">Favourite Teacher</option>
<option value="What is your dream job?">Dream Job</option>
<option value="What is your favourite movie?">Favourite Movie</option>
</select>

<input type="text" name="securityAnswer2" placeholder="Answer">
</div>


<div class="form-group">
<label>Security Question 3</label>
<select name="securityQuestion3">
<option value="What is your favourite sport?">Favourite Sport</option>
<option value="What was your childhood pet name?">Pet Name</option>
<option value="What is your favourite place?">Favourite Place</option>
</select>

<input type="text" name="securityAnswer3" placeholder="Answer">
</div>

</div>

<button type="submit" class="save-btn">
Save Security Questions
</button>

</form>

</div>

</div>

</html>
