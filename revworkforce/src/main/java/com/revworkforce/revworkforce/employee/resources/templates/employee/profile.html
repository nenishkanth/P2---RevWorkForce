<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/employee-base :: layout(~{::content})}">

<div th:fragment="content">
    <style>
        /* ===== PREMIUM PROFILE PAGE STYLING ===== */
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Form card */
        .profile-form {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(45, 212, 191, 0.2);
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
            transition: var(--transition);
        }

        .profile-form:hover {
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.12);
            background: rgba(255, 255, 255, 0.8);
        }

        /* Profile image */
        .avatar-wrapper {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-image {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent);
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        .profile-image:hover {
            transform: scale(1.02);
            border-color: var(--accent-light);
        }

        .profile-image-placeholder {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent), var(--accent-dark));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 600;
            margin: 0 auto;
            border: 4px solid white;
            box-shadow: var(--shadow-md);
        }

        /* File upload */
        .file-upload {
            margin-top: 1rem;
            text-align: center;
        }

        .file-upload label {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.6rem 2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .file-upload label:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -8px var(--accent);
        }

        .file-upload input {
            display: none;
        }

        /* Section headings */
        .section-heading {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--navy);
            margin: 2rem 0 1.5rem;
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
            background: linear-gradient(145deg, var(--navy), var(--navy-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Form rows */
        .form-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.2rem;
        }

        .form-row label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--navy);
            margin-bottom: 0.3rem;
        }

        .form-row input,
        .form-row select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 1px solid #d1d9e6;
            border-radius: 14px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.8);
            transition: var(--transition);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .form-row input:focus,
        .form-row select:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.15);
            background: white;
        }

        .form-row input[readonly] {
            background: #f1f5f9;
            border-color: #e2e8f0;
            color: #475569;
            cursor: not-allowed;
        }

        /* Save button */
        .save-btn {
            width: 100%;
            padding: 0.9rem;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(145deg, var(--accent), var(--accent-dark));
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(15, 118, 110, 0.5);
            background: linear-gradient(145deg, var(--accent-light), var(--accent));
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-form {
                padding: 1.5rem;
            }
            .profile-image,
            .profile-image-placeholder {
                width: 100px;
                height: 100px;
                font-size: 2.5rem;
            }
        }
    </style>

    <div class="profile-container">
        <h2>My Profile</h2>

        <!-- ================= PROFILE FORM ================= -->
        <form method="post"
              action="/employee/profile/update"
              enctype="multipart/form-data"
              class="profile-form">

            <h3 class="section-heading">Profile Details</h3>

            <!-- Profile Image -->
            <div class="avatar-wrapper">
                <div th:if="${employee.profilePic != null}">
                    <img th:src="@{'/uploads/' + ${employee.profilePic}}"
                         class="profile-image"
                         alt="Profile">
                </div>
                <div th:if="${employee.profilePic == null}" class="profile-image-placeholder">
                    <span th:text="${#strings.substring(employee.firstName,0,1)}">A</span>
                </div>

                <div class="file-upload">
                    <label for="profilePicInput">
                        <i class="fas fa-camera"></i> Change Photo
                    </label>
                    <input type="file" id="profilePicInput" name="profilePic" accept="image/*">
                </div>
            </div>

            <!-- Basic Details -->
            <div class="form-row">
                <label>Employee ID</label>
                <input type="text" th:value="${employee.employeeId}" readonly>
            </div>

            <div class="form-row">
                <label>First Name</label>
                <input type="text" th:value="${employee.firstName}" readonly>
            </div>

            <div class="form-row">
                <label>Last Name</label>
                <input type="text" th:value="${employee.lastName}" readonly>
            </div>

            <div class="form-row">
                <label>Email</label>
                <input type="text" th:value="${employee.email}" readonly>
            </div>

            <div class="form-row">
                <label>Department</label>
                <input type="text"
                       th:value="${employee.department != null ? employee.department.name : 'Not Assigned'}"
                       readonly>
            </div>

            <div class="form-row">
                <label>Designation</label>
                <input type="text"
                       th:value="${employee.designation != null ? employee.designation.name : 'Not Assigned'}"
                       readonly>
            </div>

            <!-- Editable Fields -->
            <div class="form-row">
                <label>Phone Number</label>
                <input type="text" name="phoneNumber" th:value="${employee.phoneNumber}" placeholder="Enter phone number">
            </div>

            <div class="form-row">
                <label>Address</label>
                <input type="text" name="address" th:value="${employee.address}" placeholder="Enter address">
            </div>

            <div class="form-row">
                <label>Emergency Contact</label>
                <input type="text" name="emergencyContact" th:value="${employee.emergencyContact}" placeholder="Emergency contact number">
            </div>

            <div class="form-row">
                <label>Date of Birth</label>
                <input type="date" name="dob" th:value="${employee.dob}">
            </div>

            <div class="form-row">
                <label>Gender</label>
                <select name="gender">
                    <option value="MALE" th:selected="${employee.gender=='MALE'}">Male</option>
                    <option value="FEMALE" th:selected="${employee.gender=='FEMALE'}">Female</option>
                    <option value="OTHER" th:selected="${employee.gender=='OTHER'}">Other</option>
                </select>
            </div>

            <button type="submit" class="save-btn">
                <i class="fas fa-save"></i> Update Profile
            </button>
        </form>

        <!-- ================= SECURITY QUESTIONS FORM ================= -->
        <form method="post"
              action="/employee/security/update"
              class="profile-form">

            <h3 class="section-heading">Security Questions</h3>

            <div class="form-row">
                <label>Security Question 1</label>
                <select name="securityQuestion1">
                    <option value="">Select Question</option>
                    <option value="What is your first school name?">First School Name</option>
                    <option value="What is your favorite food?">Favorite Food</option>
                    <option value="What is your childhood nickname?">Childhood Nickname</option>
                </select>
                <input type="text" name="securityAnswer1" placeholder="Enter Answer" style="margin-top:0.5rem;">
            </div>

            <div class="form-row">
                <label>Security Question 2</label>
                <select name="securityQuestion2">
                    <option value="">Select Question</option>
                    <option value="What is your favourite teacher name?">Teacher Name</option>
                    <option value="What is your dream job?">Dream Job</option>
                    <option value="What is your favourite movie?">Favourite Movie</option>
                </select>
                <input type="text" name="securityAnswer2" placeholder="Enter Answer" style="margin-top:0.5rem;">
            </div>

            <div class="form-row">
                <label>Security Question 3</label>
                <select name="securityQuestion3">
                    <option value="">Select Question</option>
                    <option value="What is your favourite sport?">Favourite Sport</option>
                    <option value="What was your childhood pet name?">Pet Name</option>
                    <option value="What is your favourite place?">Favourite Place</option>
                </select>
                <input type="text" name="securityAnswer3" placeholder="Enter Answer" style="margin-top:0.5rem;">
            </div>

            <button type="submit" class="save-btn">
                <i class="fas fa-shield-alt"></i> Update Security Questions
            </button>
        </form>
    </div>
</div>
</html>
